<!DOCTYPE html>
<html>
<body>
<script>
  const req = indexedDB.open("BuckfloDB");
  req.onsuccess = (e) => {
    const db = e.target.result;
    console.log("DB version:", db.version);
    const tx = db.transaction("accounts", "readonly");
    const store = tx.objectStore("accounts");
    const req2 = store.getAll();
    req2.onsuccess = (e2) => {
      console.log("Accounts:", JSON.stringify(e2.target.result, null, 2));
    };
  };
</script>
</body>
</html>
