// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.13.0'
        classpath 'com.google.gms:google-services:4.4.4'

        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}

apply from: "variables.gradle"

allprojects {
    repositories {
        google()
        mavenCentral()
    }

    // Redirect build directory to internal drive to avoid AppleDouble (._*) files on external drives (e.g. ExFAT)
    // which cause R8 to fail with "Invalid classfile header" and other build errors.
    layout.buildDirectory.set(file("${System.getProperty('user.home')}/.gradle/builds/pocket_ledger/${project.path.replace(':', '_')}"))
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
