<!DOCTYPE html>
<html>
<body>
<script>
  const req = indexedDB.open("BuckfloDB");
  req.onsuccess = (e) => {
    const db = e.target.result;
    const tx = db.transaction(["profile", "monthSetups"], "readwrite");
    
    // Reset wizardCompleted safely
    const profileStore = tx.objectStore("profile");
    const getReq = profileStore.get(1);
    getReq.onsuccess = () => {
      const p = getReq.result;
      if (p) {
        p.wizardCompleted = false;
        profileStore.put(p);
      }
    };
    
    // Delete monthSetups
    tx.objectStore("monthSetups").clear();
    
    tx.oncomplete = () => {
      console.log("Wizard safely reset!");
      document.body.innerHTML = "<h1>Wizard Reset! You can close this tab and go back to your app.</h1>";
    };
  };
</script>
</body>
</html>
