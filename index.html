<!doctype html>
<html lang="en">
  <head>
    <script>
      (function() {
        const saved = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (saved === 'dark' || (!saved && prefersDark)) {
          document.documentElement.classList.add('dark');
          document.documentElement.classList.remove('light');
        } else {
          document.documentElement.classList.add('light');
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#d97757" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="flo" />
    <meta name="description" content="Personal expense tracker — log daily transactions, track your budget, and manage two bank accounts offline." />

    <link rel="icon" type="image/png" href="/flo_favicon.png" />
    <link rel="apple-touch-icon" href="/flo_appicon.png" />

    <title>flo — Personal Expense Tracker</title>

    <style>
      /* Prevent FOUC */
      html { background-color: #eeeae4; }
      html.dark { background-color: #0d0c0b; }
      @keyframes spin {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
